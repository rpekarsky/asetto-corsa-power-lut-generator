<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 LUT Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1>F1 Power LUT Generator</h1>
  <span class="subtitle">// Assetto Corsa · engine torque curves</span>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="field-group">
      <label>Team Name</label>
      <input type="text" id="teamName" placeholder="e.g. ROSSO CORSA" value="">
    </div>

    <div class="field-group">
      <label>Engine Name</label>
      <input type="text" id="engineName" placeholder="e.g. Ferrari V12" value="">
    </div>

    <div class="field-group">
      <label>Max Power (PS)</label>
      <input type="text" id="maxPower" placeholder="750–900" value="">
    </div>

    <div class="field-group">
      <label>Peak Torque (N·m)</label>
      <input type="text" id="peakTorque" placeholder="auto" value="">
    </div>

    <div class="field-group">
      <label>Power Character</label>
      <select id="character">
        <option value="early">Early peak (V8 style)</option>
        <option value="mid" selected>Mid peak (V10 balanced)</option>
        <option value="late">Late peak (V12 high-rev)</option>
        <option value="sharp">Sharp & aggressive</option>
        <option value="flat">Flat torque plateau</option>
      </select>
    </div>

    <div class="field-group">
      <label>Max RPM <button type="button" class="btn-edit" id="btnToggleRpm" title="Custom value">✎</button></label>
      <select id="maxRpm">
        <option value="12000">12 000</option>
        <option value="13500" selected>13 500</option>
        <option value="15000">15 000</option>
        <option value="16500">16 500</option>
      </select>
      <input type="text" id="maxRpmCustom" class="hidden" placeholder="e.g. 14200" value="">
    </div>

    <div class="field-group">
      <label>LUT Step (RPM)</label>
      <input type="text" id="lutStep" placeholder="500" value="500">
    </div>

    <hr class="divider">

    <div class="field-group">
      <label class="section-comment">// CURVE SHAPE</label>

      <div class="slider-field">
        <div class="slider-label"><span>Peak position</span><span id="peakPosVal">52%</span></div>
        <input type="range" id="peakPos" min="30" max="85" value="52" step="1">
      </div>

      <div class="slider-field">
        <div class="slider-label"><span>Sharpness</span><span id="sharpnessVal">1.00</span></div>
        <input type="range" id="sharpness" min="50" max="250" value="100" step="5">
      </div>

      <div class="slider-field">
        <div class="slider-label"><span>Noise</span><span id="noiseVal">3%</span></div>
        <input type="range" id="noise" min="0" max="15" value="3" step="1">
      </div>
    </div>

    <hr class="divider">

    <div class="field-group">
      <label>Computed Stats</label>
      <div class="stat-row"><span>Peak Torque</span><span id="statTorque">—</span></div>
      <div class="stat-row"><span>Peak at RPM</span><span id="statRpm">—</span></div>
      <div class="stat-row"><span>Power (7-speed)</span><span id="statPower">—</span></div>
      <div class="stat-row"><span>Usable RPM band</span><span id="statBand">—</span></div>
    </div>

    <hr class="divider">

    <div class="seed-row">
      <div class="field-group" style="flex:1">
        <label>Seed</label>
        <input type="text" id="seed" placeholder="auto" value="">
      </div>
      <button class="btn btn-primary btn-generate" id="btnGenerate">⚡ NEW</button>
    </div>
    <button class="btn btn-secondary" id="btnRandomize">🎲 RANDOMIZE ALL</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="chart-area">
      <div class="chart-header">
        <div>
          <div class="team-name-display" id="displayTeam">—</div>
          <div class="engine-display" id="displayEngine">—</div>
          <div class="tags" id="displayTags"></div>
        </div>
        <div class="power-badge" id="displayPower">—<br><span>PS · 7-speed</span></div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Torque (N·m)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div> Power (bhp)</div>
      </div>
    </div>

    <div class="lut-area">
      <div class="lut-panel">
        <div class="lut-label">
          power.lut (torque)
          <button id="btnCopyTorque">COPY</button>
        </div>
        <div class="lut-output" id="lutTorque">// press GENERATE</div>
      </div>
      <div class="lut-panel">
        <div class="lut-label">
          power_auto.lut (~81%)
          <button id="btnCopyAuto">COPY</button>
        </div>
        <div class="lut-output" id="lutAuto">// press GENERATE</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
