<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 LUT Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --bg3: #141428;
    --panel: #12121f;
    --border: #2a2a4a;
    --accent: #e8c840;
    --accent2: #40c8e8;
    --accent3: #e84060;
    --text: #d0d0e8;
    --muted: #606080;
    --green: #40e880;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 80px);
  }

  /* LEFT PANEL */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    overflow-y: auto;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  input[type="text"], select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.5rem 0.7rem;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }

  select option {
    background: var(--bg3);
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row span:last-child { color: var(--accent); }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.7rem 1.2rem;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #ffd800; border-color: #ffd800; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    background: transparent;
    color: var(--accent2);
    border-color: var(--accent2);
  }
  .btn-secondary:hover { background: rgba(64,200,232,0.08); }

  .btn-copy {
    background: transparent;
    color: var(--green);
    border-color: var(--green);
  }
  .btn-copy:hover { background: rgba(64,232,128,0.08); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* RIGHT PANEL */
  .content {
    display: grid;
    grid-template-rows: 1fr 200px;
    overflow: hidden;
  }

  .chart-area {
    padding: 1.5rem 2rem 1rem;
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chart-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .team-name-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(232,200,64,0.4);
  }

  .engine-display {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.2rem;
    letter-spacing: 0.08em;
  }

  .power-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    text-align: right;
    line-height: 1;
  }
  .power-badge span { font-size: 0.8rem; color: var(--muted); }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; }
  .legend-dot { width: 24px; height: 2px; }

  /* LUT OUTPUT */
  .lut-area {
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .lut-panel {
    padding: 1rem 1.5rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .lut-panel:last-child { border-right: none; }

  .lut-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .lut-label button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 0.1rem 0.5rem;
    cursor: pointer;
    letter-spacing: 0.08em;
  }
  .lut-label button:hover { background: rgba(64,232,128,0.1); }

  .lut-output {
    font-size: 0.72rem;
    color: var(--accent2);
    line-height: 1.6;
    overflow-y: auto;
    max-height: 140px;
    white-space: pre;
  }

  /* TAG badges */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.3rem;
  }
  .tag {
    font-size: 0.6rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .tag.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .flash {
    animation: flash 0.3s ease;
  }
  @keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <h1>F1 Power LUT Generator</h1>
  <span class="subtitle">// Assetto Corsa · engine torque curves</span>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="field-group">
      <label>Team Name</label>
      <input type="text" id="teamName" placeholder="e.g. ROSSO CORSA" value="">
    </div>

    <div class="field-group">
      <label>Engine Name</label>
      <input type="text" id="engineName" placeholder="e.g. Ferrari V12" value="">
    </div>

    <div class="row2">
      <div class="field-group">
        <label>Engine Type</label>
        <select id="engineType">
          <option value="v8">V8</option>
          <option value="v10" selected>V10</option>
          <option value="v12">V12</option>
          <option value="v40">V40 (exotic)</option>
        </select>
      </div>
      <div class="field-group">
        <label>Max Power (PS)</label>
        <input type="text" id="maxPower" placeholder="750–900" value="">
      </div>
    </div>

    <div class="field-group">
      <label>Power Character</label>
      <select id="character">
        <option value="early">Early peak (V8 style)</option>
        <option value="mid" selected>Mid peak (V10 balanced)</option>
        <option value="late">Late peak (V12 high-rev)</option>
        <option value="sharp">Sharp & aggressive</option>
        <option value="flat">Flat torque plateau</option>
      </select>
    </div>

    <div class="field-group">
      <label>Max RPM</label>
      <select id="maxRpm">
        <option value="12000">12 000</option>
        <option value="13500" selected>13 500</option>
        <option value="15000">15 000</option>
        <option value="16500">16 500</option>
      </select>
    </div>

    <hr class="divider">

    <div class="field-group">
      <label>Computed Stats</label>
      <div class="stat-row"><span>Peak Torque</span><span id="statTorque">—</span></div>
      <div class="stat-row"><span>Peak at RPM</span><span id="statRpm">—</span></div>
      <div class="stat-row"><span>Power (7-speed)</span><span id="statPower">—</span></div>
      <div class="stat-row"><span>Usable RPM band</span><span id="statBand">—</span></div>
    </div>

    <hr class="divider">

    <button class="btn btn-primary" onclick="generate()">⚡ GENERATE</button>
    <button class="btn btn-secondary" onclick="randomize()">🎲 RANDOMIZE ALL</button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="chart-area">
      <div class="chart-header">
        <div>
          <div class="team-name-display" id="displayTeam">—</div>
          <div class="engine-display" id="displayEngine">—</div>
          <div class="tags" id="displayTags"></div>
        </div>
        <div class="power-badge" id="displayPower">—<br><span>PS · 7-speed</span></div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Torque (N·m)</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent3)"></div> Power (bhp)</div>
      </div>
    </div>

    <div class="lut-area">
      <div class="lut-panel">
        <div class="lut-label">
          power.lut (torque)
          <button onclick="copyLut('torque')">COPY</button>
        </div>
        <div class="lut-output" id="lutTorque">// press GENERATE</div>
      </div>
      <div class="lut-panel">
        <div class="lut-label">
          power_auto.lut (~81%)
          <button onclick="copyLut('auto')">COPY</button>
        </div>
        <div class="lut-output" id="lutAuto">// press GENERATE</div>
      </div>
    </div>
  </div>
</div>

<script>
const engineDefaults = {
  v8:  { powerRange: [680, 800], charOptions: ['early','flat'],   rpmPref: 13500 },
  v10: { powerRange: [790, 850], charOptions: ['mid','flat'],     rpmPref: 13500 },
  v12: { powerRange: [840, 920], charOptions: ['late','sharp'],   rpmPref: 15000 },
  v40: { powerRange: [820, 880], charOptions: ['sharp','mid'],    rpmPref: 16500 },
};

const charTags = {
  early: ['broad torque','low-end pull','forgiving'],
  mid:   ['balanced','smooth delivery','versatile'],
  late:  ['high-rev','narrow band','aggressive'],
  sharp: ['peaky','fast spin','technical'],
  flat:  ['wide plateau','consistent','easy to drive'],
};

// Returns array of {rpm, torque} normalised to maxTorque=1
function buildShape(character, maxRpm, steps=18) {
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const r = i / steps; // 0..1
    let t;
    if (character === 'early') {
      // peak around 50% of rev range
      t = Math.pow(Math.sin(r * Math.PI * 0.95), 0.6) * (r < 0.5 ? 1.15 : 1.0);
      t = Math.min(t, 1);
    } else if (character === 'late') {
      // peak around 75%
      t = Math.pow(Math.sin(r * Math.PI * 0.85 + 0.08), 0.75);
      if (r < 0.15) t *= r / 0.15;
    } else if (character === 'sharp') {
      // narrow gaussian-like peak around 70%
      const peak = 0.70;
      t = Math.exp(-Math.pow((r - peak) / 0.22, 2));
      if (r < 0.1) t *= r / 0.1;
    } else if (character === 'flat') {
      // broad plateau 40-80%
      if (r < 0.25) t = r / 0.25;
      else if (r < 0.75) t = 1.0 - 0.05 * Math.sin((r - 0.25) / 0.5 * Math.PI);
      else t = Math.pow(1 - (r - 0.75) / 0.25, 1.2);
    } else {
      // mid — classic bell slightly skewed right
      t = Math.pow(Math.sin(r * Math.PI * 0.90 + 0.05), 0.65);
      if (r < 0.1) t *= r / 0.1;
    }
    t = Math.max(0, t);
    pts.push({ r, t });
  }
  // add small random variation per point (±3%)
  return pts.map(p => ({ r: p.r, t: Math.min(1, p.t * (1 + (Math.random() - 0.5) * 0.06)) }));
}

let currentLut = [];
let currentLutAuto = [];

function computeLut(pts, maxRpm, maxTorqueNm) {
  const map = new Map();
  pts.forEach(p => {
    const rpm = Math.round(p.r * maxRpm / 900) * 900;
    const torque = Math.round(p.t * maxTorqueNm);
    map.set(rpm, torque); // last value wins — no duplicate RPMs
  });
  return Array.from(map, ([rpm, torque]) => ({ rpm, torque }));
}

// torque from power: T = P*735.5 / (RPM * 2π/60)
function powerToTorque(ps, rpm) {
  return (ps * 735.5) / (rpm * Math.PI / 30);
}

function generate() {
  const teamName = document.getElementById('teamName').value.trim().toUpperCase() || 'UNNAMED';
  const engineName = document.getElementById('engineName').value.trim() || '—';
  const engineType = document.getElementById('engineType').value;
  const character = document.getElementById('character').value;
  const maxRpm = parseInt(document.getElementById('maxRpm').value);
  let maxPower = parseInt(document.getElementById('maxPower').value);

  if (isNaN(maxPower) || maxPower < 500 || maxPower > 1200) {
    const def = engineDefaults[engineType].powerRange;
    maxPower = def[0] + Math.round(Math.random() * (def[1] - def[0]));
    document.getElementById('maxPower').value = maxPower;
  }

  // find peak RPM from shape
  const shape = buildShape(character, maxRpm);
  let peakIdx = 0;
  shape.forEach((p, i) => { if (p.t > shape[peakIdx].t) peakIdx = i; });
  const peakRpm = Math.round(shape[peakIdx].r * maxRpm / 900) * 900;

  const maxTorqueNm = powerToTorque(maxPower, peakRpm);

  const lut = computeLut(shape, maxRpm, maxTorqueNm);
  // ensure starts at 0
  lut[0].torque = 0;
  lut[1].torque = 0;

  currentLut = lut;
  currentLutAuto = lut.map(p => ({ rpm: p.rpm, torque: Math.round(p.torque * 0.81) }));

  // stats
  const peakTorque = Math.round(maxTorqueNm);
  document.getElementById('statTorque').textContent = peakTorque + ' N·m';
  document.getElementById('statRpm').textContent = peakRpm.toLocaleString() + ' RPM';
  document.getElementById('statPower').textContent = maxPower + ' PS';
  const bandStart = lut.find(p => p.torque > maxTorqueNm * 0.85)?.rpm || 0;
  const bandEnd = [...lut].reverse().find(p => p.torque > maxTorqueNm * 0.85)?.rpm || 0;
  document.getElementById('statBand').textContent = (bandStart/1000).toFixed(1) + 'k – ' + (bandEnd/1000).toFixed(1) + 'k';

  // display
  document.getElementById('displayTeam').textContent = teamName;
  document.getElementById('displayTeam').classList.add('flash');
  setTimeout(() => document.getElementById('displayTeam').classList.remove('flash'), 400);
  document.getElementById('displayEngine').textContent = engineName + ' · ' + engineType.toUpperCase();
  document.getElementById('displayPower').innerHTML = maxPower + '<br><span>PS · 7-speed</span>';

  const tags = charTags[character] || [];
  const tagsEl = document.getElementById('displayTags');
  tagsEl.innerHTML = tags.map(t => `<span class="tag active">${t}</span>`).join('');

  // lut text
  document.getElementById('lutTorque').textContent = lut.map(p => `${p.rpm}|${p.torque}`).join('\n');
  document.getElementById('lutAuto').textContent = currentLutAuto.map(p => `${p.rpm}|${p.torque}`).join('\n');

  drawChart(lut, maxRpm, peakTorque, maxPower);
}

function drawChart(lut, maxRpm, peakTorque, maxPower) {
  const canvas = document.getElementById('chart');
  const wrap = canvas.parentElement;
  const ctx = canvas.getContext('2d');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const pad = { l: 48, r: 48, t: 10, b: 30 };

  ctx.clearRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = 'rgba(42,42,74,0.8)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (H - pad.t - pad.b) * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }
  for (let r = 0; r <= maxRpm; r += 3000) {
    const x = pad.l + (W - pad.l - pad.r) * r / maxRpm;
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
    ctx.fillStyle = 'rgba(96,96,128,0.7)';
    ctx.font = '9px Share Tech Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText((r/1000).toFixed(0) + 'k', x, H - pad.b + 14);
  }

  function toX(rpm) { return pad.l + (W - pad.l - pad.r) * rpm / maxRpm; }
  function toY(val, max) { return pad.t + (H - pad.t - pad.b) * (1 - val / max); }

  // compute bhp values and find actual peak for scaling
  const bhpData = lut.map(p => (p.torque * p.rpm * Math.PI / 30) / 735.5);
  const actualMaxBhp = Math.max(...bhpData);
  const maxBhp = actualMaxBhp * 1.08;
  const maxTorqueScale = peakTorque * 1.08;

  // power curve
  ctx.beginPath();
  ctx.strokeStyle = '#e84060';
  ctx.lineWidth = 1.5;
  lut.forEach((p, i) => {
    const x = toX(p.rpm);
    const y = toY(bhpData[i], maxBhp);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // torque curve
  ctx.beginPath();
  ctx.strokeStyle = '#e8c840';
  ctx.lineWidth = 2;
  lut.forEach((p, i) => {
    const x = toX(p.rpm);
    const y = toY(p.torque, maxTorqueScale);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // axis labels
  ctx.fillStyle = 'rgba(96,96,128,0.7)';
  ctx.font = '9px Share Tech Mono, monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = Math.round(peakTorque * 1.05 * (1 - i / 4));
    ctx.fillText(val, pad.l - 4, pad.t + (H - pad.t - pad.b) * i / 4 + 3);
  }
}

function randomize() {
  const engines = ['v8','v10','v12','v40'];
  const chars = ['early','mid','late','sharp','flat'];
  const rpms = ['12000','13500','15000','16500'];
  const teamNames = ['THUNDER','ECLIPSE','NOVA RACING','IRON WOLF','ZENITH','APEX','STORM','PHANTOM','SIGMA','DELTA FORCE'];
  const engineNames = [
    'Hartwell V8','Kronos V10','Atlas V12','Lumina V10','Viper V8',
    'Olympus V12','Nexus V10','Titan V8','Helix V12','Pulsar V10'
  ];

  const et = engines[Math.floor(Math.random() * engines.length)];
  const def = engineDefaults[et];
  const ps = def.powerRange[0] + Math.round(Math.random() * (def.powerRange[1] - def.powerRange[0]));

  document.getElementById('engineType').value = et;
  document.getElementById('character').value = chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('maxRpm').value = rpms[Math.floor(Math.random() * rpms.length)];
  document.getElementById('maxPower').value = ps;
  document.getElementById('teamName').value = teamNames[Math.floor(Math.random() * teamNames.length)];
  document.getElementById('engineName').value = engineNames[Math.floor(Math.random() * engineNames.length)];

  generate();
}

function copyLut(which) {
  const el = document.getElementById(which === 'torque' ? 'lutTorque' : 'lutAuto');
  navigator.clipboard.writeText(el.textContent).then(() => {
    el.style.color = 'var(--green)';
    setTimeout(() => el.style.color = 'var(--accent2)', 600);
  });
}

// init
window.addEventListener('load', () => { randomize(); });
window.addEventListener('resize', () => {
  if (currentLut.length) {
    const peakTorque = Math.max(...currentLut.map(p => p.torque));
    const maxPower = parseInt(document.getElementById('maxPower').value);
    const maxRpm = parseInt(document.getElementById('maxRpm').value);
    drawChart(currentLut, maxRpm, peakTorque, maxPower);
  }
});
</script>
</body>
</html>
